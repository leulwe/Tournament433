<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squad Face Cropper (Multiple Photos)</title>
    
    <!-- Load face-api.js from CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        :root {
            --primary: #4F46E5;
            --background: #F3F4F6;
            --surface: #FFFFFF;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: #333;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .header { margin-bottom: 20px; }
        .header h1 { margin: 0 0 10px 0; color: #111; }
        
        /* Upload Button */
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .btn {
            border: none;
            color: white;
            background-color: var(--primary);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #4338ca; }
        .btn:disabled { background-color: #9CA3AF; cursor: not-allowed; }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0; top: 0;
            opacity: 0; cursor: pointer;
        }
        
        #status {
            margin: 15px 0;
            font-weight: 600;
            font-size: 1.1rem;
            color: #4B5563;
        }

        /* Images and Manual Crop Container */
        #interactive-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        #source-images-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px; /* Space between multiple images */
            align-items: center;
            width: 100%;
        }
        .image-container {
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair;
            user-select: none;
            touch-action: none; /* Prevent scrolling while cropping on mobile */
            display: inline-block;
        }
        .source-preview {
            display: block;
            max-width: 100%;
            max-height: 500px;
            pointer-events: none; /* Let container handle mouse events */
        }
        .selection-box {
            position: absolute;
            border: 2px dashed #EF4444;
            background-color: rgba(239, 68, 68, 0.2);
            display: none;
            pointer-events: none;
        }
        
        #manual-hint {
            display: none;
            background: #E0E7FF;
            color: #3730A3;
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Generated Gallery */
        #gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .face-card {
            background: var(--surface);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        canvas {
            border-radius: 8px;
            margin-bottom: 12px;
            max-width: 150px;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .download-btn {
            text-decoration: none;
            background: #10B981;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
        }
        .download-btn:hover { background: #059669; }
        .delete-btn {
            background: #EF4444;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .delete-btn:hover { background: #DC2626; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📸 Squad Face Cropper</h1>
        <p>Upload multiple photos! AI will extract all faces. <b>Click & drag on any photo to manually crop!</b></p>
    </div>

    <div class="upload-btn-wrapper">
        <button class="btn" id="uploadBtn" disabled>Loading AI Models...</button>
        <!-- ADDED 'multiple' attribute here -->
        <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp" multiple disabled />
    </div>

    <div id="status">Please wait while the AI models load...</div>

    <div id="gallery"></div>

    <div id="interactive-area">
        <div id="manual-hint">💡 Tip: If the AI missed someone, just click and drag on any of the photos below to crop them!</div>
        <div id="source-images-wrapper"></div>
    </div>
    
    <script>
        // DOM Elements
        const imageUpload = document.getElementById('imageUpload');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const gallery = document.getElementById('gallery');
        const sourceImagesWrapper = document.getElementById('source-images-wrapper');
        const manualHint = document.getElementById('manual-hint');

        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';

        let autoCropCount = 0;
        let manualCropCount = 0;

        // --- 1. Load AI Models ---
        async function loadModels() {
            try {
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                status.innerText = "✅ AI Models Loaded! Select one or more photos.";
                status.style.color = "#10B981";
                
                imageUpload.disabled = false;
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Choose Photos";
            } catch (err) {
                status.innerText = "❌ Failed to load AI models. Please check your internet connection.";
                status.style.color = "#EF4444";
            }
        }
        window.onload = loadModels;

        // --- 2. Handle Multiple Image Uploads & Auto Crop ---
        imageUpload.addEventListener('change', async (event) => {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            // Reset UI
            gallery.innerHTML = '';
            sourceImagesWrapper.innerHTML = '';
            autoCropCount = 0;
            manualCropCount = 0;
            manualHint.style.display = 'none';

            status.innerText = `🔍 Scanning ${files.length} image(s) for faces... Please wait.`;
            status.style.color = "#4F46E5";

            let totalFacesFound = 0;

            // Process every uploaded image sequentially
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const imgUrl = URL.createObjectURL(file);

                status.innerText = `🔍 Processing image ${i + 1} of ${files.length}...`;

                // Create Container for this specific image
                const container = document.createElement('div');
                container.className = 'image-container';

                const img = document.createElement('img');
                img.src = imgUrl;
                img.className = 'source-preview';
                img.draggable = false;

                const selBox = document.createElement('div');
                selBox.className = 'selection-box';

                container.appendChild(img);
                container.appendChild(selBox);
                sourceImagesWrapper.appendChild(container);

                // Attach manual crop events specific to this container
                container.addEventListener('mousedown', handleStart);
                container.addEventListener('touchstart', handleStart, {passive: false});

                // Wait for the image to visually load before running AI
                await new Promise((resolve) => {
                    img.onload = async () => {
                        const detections = await faceapi.detectAllFaces(img, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.4 }));
                        totalFacesFound += detections.length;

                        // Auto-crop each detected face
                        detections.forEach((detection) => {
                            const box = detection.box;
                            
                            const padX = box.width * 0.25;
                            const padY = box.height * 0.25;
                            
                            const x = Math.max(0, box.x - padX);
                            const y = Math.max(0, box.y - padY);
                            // Ensure we don't crop outside image boundaries
                            const width = Math.min(img.naturalWidth - x, box.width + padX * 2);
                            const height = Math.min(img.naturalHeight - y, box.height + padY * 2);

                            autoCropCount++;
                            createCropCard(x, y, width, height, `AI Crop ${autoCropCount}`, img);
                        });
                        resolve();
                    };
                });
            }

            // Finished scanning all images
            manualHint.style.display = 'block';

            if (totalFacesFound === 0) {
                status.innerText = "⚠️ No faces found by AI. You can draw boxes manually below!";
                status.style.color = "#F59E0B";
            } else {
                status.innerText = `🎉 AI found ${totalFacesFound} face(s) across ${files.length} photo(s)!`;
                status.style.color = "#10B981";
            }
        });

        // --- 3. Manual Cropping Logic (Click & Drag for multiple images) ---
        let isDrawing = false;
        let startX = 0;
        let startY = 0;
        let activeContainer = null;
        let activeImg = null;
        let activeSelectionBox = null;

        function getPointerPos(e, container) {
            const rect = container.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleStart(e) {
            isDrawing = true;
            activeContainer = e.currentTarget;
            activeImg = activeContainer.querySelector('.source-preview');
            activeSelectionBox = activeContainer.querySelector('.selection-box');

            const pos = getPointerPos(e, activeContainer);
            startX = pos.x;
            startY = pos.y;
            
            activeSelectionBox.style.left = startX + 'px';
            activeSelectionBox.style.top = startY + 'px';
            activeSelectionBox.style.width = '0px';
            activeSelectionBox.style.height = '0px';
            activeSelectionBox.style.display = 'block';
        }

        function handleMove(e) {
            if (!isDrawing || !activeContainer) return;
            if (e.cancelable) e.preventDefault(); // Stop mobile scrolling while drawing

            const pos = getPointerPos(e, activeContainer);
            
            const left = Math.min(startX, pos.x);
            const top = Math.min(startY, pos.y);
            const width = Math.abs(pos.x - startX);
            const height = Math.abs(pos.y - startY);

            activeSelectionBox.style.left = left + 'px';
            activeSelectionBox.style.top = top + 'px';
            activeSelectionBox.style.width = width + 'px';
            activeSelectionBox.style.height = height + 'px';
        }

        function handleEnd(e) {
            if (!isDrawing || !activeContainer) return;
            isDrawing = false;
            activeSelectionBox.style.display = 'none';
            
            const displayWidth = parseFloat(activeSelectionBox.style.width);
            const displayHeight = parseFloat(activeSelectionBox.style.height);
            const displayLeft = parseFloat(activeSelectionBox.style.left);
            const displayTop = parseFloat(activeSelectionBox.style.top);

            if (displayWidth > 20 && displayHeight > 20) {
                // scale = Real Image Dimensions / Preview Container Dimensions
                const scaleX = activeImg.naturalWidth / activeImg.width;
                const scaleY = activeImg.naturalHeight / activeImg.height;

                const realX = displayLeft * scaleX;
                const realY = displayTop * scaleY;
                const realW = displayWidth * scaleX;
                const realH = displayHeight * scaleY;

                manualCropCount++;
                createCropCard(realX, realY, realW, realH, `Manual Crop ${manualCropCount}`, activeImg);
            }

            // Clear active tracking
            activeContainer = null;
            activeImg = null;
            activeSelectionBox = null;
        }

        // Attach Mouse Events globally for Move/End
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        // Attach Touch Events (Mobile) globally for Move/End
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', handleEnd);


        // --- 4. Reusable Function to Build the Crop UI Card ---
        function createCropCard(x, y, width, height, titleText, sourceImg) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');

            canvas.width = width;
            canvas.height = height;

            // Draw cropped image onto canvas using the specific source image
            context.drawImage(
                sourceImg,
                x, y, width, height, // Source dimensions
                0, 0, width, height  // Destination dimensions
            );

            // Create Card Container
            const card = document.createElement('div');
            card.className = 'face-card';

            const title = document.createElement('div');
            title.innerText = titleText;
            title.style.marginBottom = '8px';
            title.style.fontWeight = 'bold';

            // Button Container
            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            // Download Button
            const downloadBtn = document.createElement('a');
            downloadBtn.className = 'download-btn';
            downloadBtn.innerText = '⬇️ Save';
            downloadBtn.href = canvas.toDataURL('image/jpeg', 0.9);
            downloadBtn.download = `${titleText.replace(/\s+/g, '-').toLowerCase()}.jpg`;

            // Delete Button
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerText = '❌';
            deleteBtn.title = "Delete this crop";
            deleteBtn.onclick = () => card.remove(); // Removes the card from UI

            btnGroup.appendChild(downloadBtn);
            btnGroup.appendChild(deleteBtn);

            card.appendChild(title);
            card.appendChild(canvas);
            card.appendChild(btnGroup);
            gallery.appendChild(card);
        }
    </script>
</body>
</html>
